apiVersion: batch/v1
kind: Job
metadata:
  name: presync-job
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation, HookSucceeded
spec:
  template:
    spec:
      containers:
      - command:
        - /bin/sh
        - "-c"
        - |
          /bin/sh <<EOF
            echo 'Running db migrations';
            sleep 10;
            exit 0
          EOF
        image: busybox:latest
        name: presync-job
      restartPolicy: Never
